name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ms1-lint-test:
    name: ms1 — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms1-core-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ms1-core-api/package-lock.json
      - run: npm ci
      - run: npm test

  ms2-lint-test:
    name: ms2 — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms2-speech-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest --tb=short || echo "No tests yet"

  frontend-lint-test:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint || echo "Lint not configured yet"
      - run: npm test || echo "No tests yet"

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ms1-lint-test, ms2-lint-test, frontend-lint-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push ms1 image
        uses: docker/build-push-action@v5
        with:
          context: ./ms1-core-api
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME || 'local' }}/englishx-ms1:latest
            ${{ secrets.DOCKERHUB_USERNAME || 'local' }}/englishx-ms1:${{ github.sha }}

      - name: Build & push ms2 image
        uses: docker/build-push-action@v5
        with:
          context: ./ms2-speech-agent
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME || 'local' }}/englishx-ms2:latest
            ${{ secrets.DOCKERHUB_USERNAME || 'local' }}/englishx-ms2:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME || 'local' }}/englishx-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME || 'local' }}/englishx-frontend:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            if [ ! -d "$HOME/EnglishX" ]; then
              git clone https://github.com/yashraj-g/EnglishX.git "$HOME/EnglishX"
            fi
            cd "$HOME/EnglishX"
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            bash infra/deploy.sh
