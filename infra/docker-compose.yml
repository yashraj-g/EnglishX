#       - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
#     healthcheck:
#       test: ["CMD-SHELL", "pg_isready -U englishx"]
#       interval: 5s
#       timeout: 5s
#       retries: 5

  # ms1 — Core API (Express.js)
  ms1-core-api:
    build: ../ms1-core-api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - DATABASE_URL=postgresql://postgres.ifbeuwuhnpglbdnybxyw:Hello_world!!@aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres
      - JWT_ACCESS_SECRET=dev-access-secret-change-in-prod
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-in-prod
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - RESEND_API_KEY=re_xxxxxxxxxxxx
      - FROM_EMAIL=onboarding@resend.dev
      - MS2_BASE_URL=http://ms2-speech-agent:8000
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped

  # ms2 — Speech Agent (FastAPI + LangGraph)
  ms2-speech-agent:
    build: ../ms2-speech-agent
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-your-gemini-api-key}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-your-deepgram-api-key}
      - MS1_BASE_URL=http://ms1-core-api:3001
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ms1-core-api
      - ms2-speech-agent
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
