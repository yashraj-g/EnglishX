
services:
  # ms1 — Core API (Express.js)
  ms1-core-api:
    build: ../ms1-core-api
    ports:
      - "3001:3001"
    env_file:
      - ../ms1-core-api/.env
    environment:
      - PORT=3001
      - NODE_ENV=development
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - MS2_BASE_URL=http://ms2-speech-agent:8000
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped

  # ms2 — Speech Agent (FastAPI + LangGraph)
  ms2-speech-agent:
    build: ../ms2-speech-agent
    ports:
      - "8000:8000"
    env_file:
      - ../ms2-speech-agent/.env
    environment:
      - PORT=8000
      - MS1_BASE_URL=http://ms1-core-api:3001
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      args:
        - MS1_URL=http://ms1-core-api:3001
        - MS2_URL=http://ms2-speech-agent:8000
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - MS1_URL=http://ms1-core-api:3001
      - MS2_URL=http://ms2-speech-agent:8000
    restart: unless-stopped

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - ms1-core-api
      - ms2-speech-agent
      - frontend
    restart: unless-stopped

  # Certbot — SSL certificate management (production only; runs then exits)
  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  certbot_webroot:
  letsencrypt:
