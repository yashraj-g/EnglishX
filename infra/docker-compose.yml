version: "3.8"

services:
#   # PostgreSQL Database
#   postgres:
#     image: postgres:16-alpine
#     environment:
#       POSTGRES_DB: englishx
#       POSTGRES_USER: englishx
#       POSTGRES_PASSWORD: englishx_dev
#     ports:
#       - "5432:5432"
#     volumes:
#       - postgres_data:/var/lib/postgresql/data
#       - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
#     healthcheck:
#       test: ["CMD-SHELL", "pg_isready -U englishx"]
#       interval: 5s
#       timeout: 5s
#       retries: 5

  # ms1 — Core API (Express.js)
  ms1-core-api:
    build: ../ms1-core-api
    ports:
      - "3001:3001"
    env_file:
      - ../ms1-core-api/.env
    environment:
      - PORT=3001
      - NODE_ENV=development
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - MS2_BASE_URL=http://ms2-speech-agent:8000
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped

  # ms2 — Speech Agent (FastAPI + LangGraph)
  ms2-speech-agent:
    build: ../ms2-speech-agent
    ports:
      - "8000:8000"
    env_file:
      - ../ms2-speech-agent/.env
    environment:
      - PORT=8000
      - MS1_BASE_URL=http://ms1-core-api:3001
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      args:
        - MS1_URL=http://ms1-core-api:3001
        - MS2_URL=http://ms2-speech-agent:8000
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - MS1_URL=http://ms1-core-api:3001
      - MS2_URL=http://ms2-speech-agent:8000
    restart: unless-stopped

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ms1-core-api
      - ms2-speech-agent
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
